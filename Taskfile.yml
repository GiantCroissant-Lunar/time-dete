version: "3"

vars:
  HUB_PACKAGE_DIR: node_modules/@giantcroissant-lunar/lunar-snake-hub
  UNIFY: dotnet tool run unify-build --
  SLN_PATH: dotnet/Plate.TimeDete.sln
  GITVERSION_JSON: bash tools/gitversion.sh

tasks:
  default:
    desc: Show available tasks
    cmds:
      - task --list

  restore:
    desc: Restore dotnet tools
    cmds:
      - dotnet tool restore

  build:
    desc: Build the .NET solution via unify-build
    deps: [restore]
    cmds:
      - '{{.UNIFY}} Compile'

  test:
    desc: Run unit tests
    deps: [restore]
    cmds:
      - dotnet test {{.SLN_PATH}}

  pack:
    desc: Create NuGet packages (version from GitVersion)
    deps: [restore]
    cmds:
      - '{{.UNIFY}} PackProjects'
    env:
      GITVERSION_MAJORMINORPATCH:
        sh: '{{.GITVERSION_JSON}} | python -c "import sys,json;print(json.load(sys.stdin)[''MajorMinorPatch''])"'

  version:
    desc: Show computed version
    deps: [restore]
    cmds:
      - '{{.GITVERSION_JSON}} | python -c "import sys,json;d=json.load(sys.stdin);print(d[''FullSemVer''])"'

  changelog:
    desc: Generate changelog from conventional commits
    cmds:
      - git-cliff -o CHANGELOG.md

  # ========================================================================
  # Hub sync (lunar-snake-hub)
  # ========================================================================

  hub:install-hooks:
    desc: Install/refresh hub-managed git hooks
    cmds:
      - cmd: node {{.HUB_PACKAGE_DIR}}/bin/hub-install-hooks.js

  hub:uninstall-hooks:
    desc: Uninstall hub-managed git hooks
    cmds:
      - cmd: node {{.HUB_PACKAGE_DIR}}/bin/hub-uninstall-hooks.js

  hub:symlink-agent:
    desc: Create .agent link to hub agent rules (for IDE agents)
    cmds:
      - cmd: |
          if not exist .agent (
            mklink /J .agent node_modules\@giantcroissant-lunar\lunar-snake-hub\.agent
          ) else (
            echo .agent already exists, skipping
          )
        platforms: [windows]
      - cmd: |
          if [ -L .agent ] || [ -e .agent ]; then
            echo ".agent already exists, skipping"
          else
            ln -s {{.HUB_PACKAGE_DIR}}/.agent .agent
          fi
        platforms: [linux, darwin]

  hub:sync:
    desc: Install hooks + link .agent (requires npm install)
    cmds:
      - task: hub:install-hooks
      - task: hub:symlink-agent
      - echo "Hub sync complete"
